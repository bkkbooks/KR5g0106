front:
  text: 洞玄靈寳五老攝召北酆鬼魔赤書玉訣
  hash: sha256:2a7ba291b8ff7a5fa6cabbd756dca9105b5af24f8564e0b08764100cb625f01e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0106_HFL_000-001a, image: hfl/1009/1009-112.png}
body:
  text: 此赤書乃學道之士之切要惜其原闕尚俟考補靈寳八威神策訣當朱書三天太上召伏蛟龍虎豹山精文著一銀木板上又書記年月師姓諱著一板上合二板納囊裏朱書次文著一板上著囊外凡三板合封爲神策如傳之狀板悉用銀木長一尺四寸廣二寸四分以絳紋之繒作囊令長一丈二尺衣之封外板上下頭印口中元始五老之章當以栢函絳文作衣衣函以請策文著别室燒香左右精心供養受以佩身天下神靈朝夕朝門給五帝玉童玉女各一十二人出入遊行五帝侍衞三界司迎生死無復三惡之難不經太山逕升九天衣飯自然位同太極要自成仙受學道士佩此文施行神呪以策文指天天神下指地地祇朝拜三界束帶指神神禮指鬼鬼自滅爽指水水神通大劫數交洪災四會以策召龍龍爲負身長修積感神靈交會所在施召舉嚮立到千變萬化適意所從出入行來位準太極皆前導飛龍後從天鈞鳳嘯鸞鳴十二華光建二七色節命靈之幡精思九年天儀自備靈寳八威神呪元始太真五靈高尊太華皓映洞朗八門五老告命無幽不關上御九天中制酆山下領河海十二水源八威神呪靈策玉文召龍負水收氣聚雲束魔送鬼掃蕩妖羣萬精摧落所誅無蠲日月五星北斗七元諸天諸地諸水諸山玉真所部冥靈大神仙王遊宴五帝伏幡天丁前驅金虎後奔玃天猛獸羅備四門所呼立到所召立前赤書焕落風火無間有所攝檢金龍驛傳畢叩齒九通仰天三嘯引天氣三咽以策文指所告之地閉氣九息而止元始五老鎮靈求仙禳災玉訣道士隱學書青帝赤書真文置東方則東嶽仙官至長齋百日精思靈寳尊神則天真下降給青要玉女九人取東嶽神仙芝草不死之藥青帝鬼魔遠舍九萬里一方凶悖惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土東方及春三月有災欲使東郷安鎮當赤書青石上鎮東方九日災自滅凶逆自消一方仁人蒼龍來翔善瑞自至國土太平書文佩身却諸禍殃身無患横常與神明相當保國寧家享福無窮道土書赤帝真文置南方則南嶽仙官至長齋百日精思靈寳尊神則天真下降給朱陵玉女八人取南嶽神仙芝草不死之藥赤帝鬼魔遠舍八萬里一方凶悖惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土南方及夏三月有災欲使南郷安鎮當朱書赤石上鎮南方八日灾自滅凶逆自消一方仁人善瑞顯明鳳凰來遊白鸞飛鳴天人歌詠欣國太平書文佩身萬夭不生禳凶却穢生致神靈福慶無窮延年長生家致興隆國祚安寧道士書黄帝真文置中央則中嶽仙官至長齋百日精思靈寳尊神則天真下降給黄素玉女十二人取中嶽神仙芝草不死之藥黄帝鬼魔遠舍十二萬里中央凶悖惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土中央及四季月有災欲使中國安鎮當朱書黄石上鎮中央十二日灾自滅凶逆自消四方和睦善瑞自生麒麟來歸白虎游庭國豐民富普天安寧書文佩身萬災不經身康氣强五官精明長保家國永亨利貞道士書白帝真文置西方則西嶽仙官至長齋百日精思靈寳尊神則天真下降給太素玉女六人取西嶽神仙芝草不死之藥白帝鬼魔遠舍六萬里西方凶悖惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土西方及秋三月有灾欲使西郷安鎮當朱書白石上置西方六日其方災自滅凶逆自消西方自歸善祥來遊靈獸飛軒金雀銜符五老歸賓國寧民休書文佩身神明交遊災不加身與五帝同厨子孫昌熾世享王侯與善因縁何慮何憂道士書黑帝真文置北方則北嶽仙官至長齋百日精思靈寳尊神則天真下降給太玄玉女五人取北嶽神仙芝草不死之藥黑帝鬼魔遠舍五萬里北方凶悖惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土北方及冬三月有災欲使北郷安鎭當朱書黑石上置北方五日其方災自消凶惡自滅北方自賔善瑞日昌地藏發泄金玉露形天人歌詠國富民豐書文佩身萬災消亡壽同天地福禄永光所向所求莫不利貞子孫昌盛世出賢明道言學至道上法修奉齋戒思神念道上希靈真滅魔却試皆當先按靈寳上元舊格施安真文鎮於方面靈真降室五帝官屬侍衞門户鬼魔消滅所向成從赤書青帝真文於青繒上置室東壁赤書赤帝真文絳繒上置南壁赤書黄帝真文黄繒上置中央赤書白帝真文白繒上置西壁赤書黑帝真文黑繒上置北壁施安五篇於齋堂之中朝暮燒香隨方禮拜不得雜俗異人干入堂内此皆方方各有威神玉童玉女侍衛犯之奏罪九天冥考立加奉者明慎禁忌九氣青天中有元始青靈之童諱開陽青典青帝赤書真文青靈童長九寸衣青羽衣手執青麾侍文左學者應思此神降己身百日精念靈真見形所求立感有佩真文此童亦恒在己肝府之中致青芽之精三氣丹天中有元始赤靈之童諱丹湶珠典赤帝赤書真文赤靈童長三寸衣赤羽衣手執赤節侍文前學者應思此神降己身百日精念靈真見形所求易感有佩真文此童亦恒在己心府之中致赤芽之精中央黄天中有元始黄靈之童諱洪瑛典黄帝赤書真文黄靈童長一寸二分衣黄羽衣手執黄鉞侍文中央學者應思此神降己身百日精念靈真見形所求立感有佩真文此童則恒在己脾府之中致黄芽之精七氣素天中有元始素靈之童諱明石流典白帝赤書真文素靈之童長七寸衣白羽衣手執白旗侍文右學者應思此神降己身百日精念靈真見形所求立感有佩真文此童則恒在己肺府之中致素芽之精五氣玄天中有元始黑靈之童諱玉滋曲黑帝赤書真文黑靈之童長五寸衣黑羽衣手執黑幢侍文後學者應思此神降己身百日精念靈真見形所求立感有佩真文此童則恒在己腎府之中致玄芽之精此五帝靈童與元始五老同生主五篇真文上統九天之氣下領五嶽中主人五藏引五芽之精補養人身服食五芽不知此神終而無感徒勞疲勤洞玄靈寳五老攝召北酆鬼魔赤書玉訣
